<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Titan+One&display=swap');

  * {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  :root {
    --yellow: #FFD93D;
    --orange: #FF6B35;
    --red: #EF233C;
    --cream: #FFF8E7;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Boogaloo', 'Comic Sans MS', cursive;
    background: radial-gradient(ellipse at top, #3d1f00 0%, #1a0a00 100%);
  }

  /* ===== HEADER ===== */
  .header {
    width: 100%;
    padding: 14px 20px 4px;
    text-align: center;
  }

  .title {
    font-family: 'Titan One', 'Impact', cursive;
    font-size: clamp(1.8rem, 7vw, 2.6rem);
    color: var(--yellow);
    text-shadow: 3px 3px 0 #7a3800, 0 0 20px rgba(255,180,0,0.4);
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: clamp(0.7rem, 2.8vw, 0.95rem);
    color: #ffb347;
    opacity: 0.85;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ===== DOG STAGE ===== */
  .dog-stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 16px;
    position: relative;
  }

  .dog-container {
    position: relative;
    width: 100%;
    max-width: 420px;
    /* Chiếm tối đa chiều cao còn lại */
    height: calc(100dvh - 220px);
    max-height: 580px;
  }

  .dog-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,217,61,0.25);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    display: block;
  }

  .dog-img.active { opacity: 1; }
15%  { opacity: 1; }
    85%  { opacity: 1; }
    to   { transform: translateX(110%); opacity: 0; }
  }

  /* ===== STATUS ===== */
  .status-area {
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .status-text {
    font-size: clamp(0.95rem, 4vw, 1.25rem);
    color: var(--cream);
    text-align: center;
    min-height: 1.6em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: color 0.3s;
  }

  .heat-bar-track {
    width: 100%;
    height: 11px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .heat-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, #FFD93D, #FF6B35, #EF233C);
    transition: width 0.12s linear;
    position: relative;
    overflow: hidden;
  }

  .heat-bar-fill::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: barShine 1s linear infinite;
  }

  @keyframes barShine {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .heat-bar-fill.danger {
    box-shadow: 0 0 14px #EF233C, 0 0 28px rgba(239,35,60,0.45);
  }

  /* ===== BUTTON ===== */
  .btn-area {
    width: 100%;
    padding: 10px 20px 22px;
    display: flex;
    justify-content: center;
  }

  .btn-say {
    width: 100%;
    max-width: 360px;
    height: 68px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    outline: none;
    position: relative;
    overflow: hidden;
    background: linear-gradient(155deg, #FFD93D 0%, #FF6B35 55%, #EF233C 100%);
    box-shadow: 0 6px 0 #8B2500, 0 8px 22px rgba(255,107,53,0.5);
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-touch-callout: none;
    touch-action: none;
  }

  .btn-say.pressed {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #8B2500, 0 4px 10px rgba(255,107,53,0.35);
  }

  .btn-say::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38%;
    background: rgba(255,255,255,0.18);
    border-radius: 18px 18px 50% 50%;
  }

  .btn-label {
    font-family: 'Titan One', 'Impact', cursive;
    font-size: clamp(1.45rem, 5.5vw, 1.9rem);
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    letter-spacing: 5px;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 100%;
  }

  .btn-icon {
    font-size: 1.3em;
    display: inline-block;
    animation: spinIcon 1.8s linear infinite paused;
  }

  .btn-say.pressed .btn-icon { animation-play-state: running; }

  @keyframes spinIcon {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    transform: scale(0);
    animation: rippleOut 0.55s linear forwards;
    pointer-events: none;
  }

  @keyframes rippleOut {
    to { transform: scale(5); opacity: 0; }
  }

  /* ===== SCREEN SHAKE ===== */
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    20%  { transform: translate(-5px, 2px); }
    40%  { transform: translate(5px,-2px); }
    60%  { transform: translate(-4px, 3px); }
    80%  { transform: translate(4px,-1px); }
  }

  body.shaking { animation: shake 0.35s ease infinite; }

  /* ===== STEAM OVERLAY ===== */
  .steam-overlay {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 5;
    opacity: 0; transition: opacity 0.5s;
  }

  .steam-overlay.active { opacity: 1; }

  .steam-blob {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,40,0.13), transparent 70%);
    animation: steamPulse 1.4s ease-in-out infinite;
  }

  @keyframes steamPulse {
    0%,100% { transform: scale(1); opacity:0.4; }
    50%     { transform: scale(1.35); opacity:1; }
  }

  /* ===== DANGER FLASH ===== */
  .danger-flash {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 6;
    background: rgba(239,35,60,0.13);
    opacity: 0;
  }

  .danger-flash.active { animation: dangerPulse 0.45s ease-in-out infinite; }

  @keyframes dangerPulse {
    0%,100% { opacity:0; }
    50%     { opacity:1; }
  }
100% { transform: translateY(-130px) scale(1.3); opacity:0; }
  }
</style>

<div class="status-area">
  <div class="status-text" id="statusText">🐾 Nhấn giữ để sấy!</div>
  <div class="heat-bar-track">
    <div class="heat-bar-fill" id="heatBar"></div>
  </div>
</div>

<div class="btn-area">
  <button class="btn-say" id="btnSay" aria-label="Sấy chó">
    <span class="btn-label">
      <span class="btn-icon">💨</span>SẤY<span class="btn-icon">💨</span>
    </span>
  </button>
</div>

<script>
(function() {
  const btn        = document.getElementById('btnSay');
  const dog1El     = document.getElementById('dog1');
  const dog2El     = document.getElementById('dog2');
  const dog3El     = document.getElementById('dog3');
  const heatBar    = document.getElementById('heatBar');
  const statusText = document.getElementById('statusText');
  const steamOv    = document.getElementById('steamOverlay');
  const dangerFl   = document.getElementById('dangerFlash');
  const dogs       = [dog1El, dog2El, dog3El];

  let isHolding = false;
  let holdStart = 0;
  let phase = 0;
  let rafId = null;
  let audioCtx = null;
  let activeSources = [];
  let masterGain = null;

  const OVERDRY_MS = 6000;

  // === AUDIO ===
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function startAudio(strong) {
    stopAudio();
    const ctx = getCtx();

    masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0, ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(strong ? 0.45 : 0.25, ctx.currentTime + 0.35);
    masterGain.connect(ctx.destination);

    // White noise → bandpass (dryer sound)
    const bufLen = ctx.sampleRate * 2;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;

    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;

    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = strong ? 950 : 650;
    bp.Q.value = 0.5;

    noise.connect(bp);
    bp.connect(masterGain);
    noise.start();

    // Motor hum
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = strong ? 115 : 82;
    const og = ctx.createGain();
    og.gain.value = strong ? 0.09 : 0.05;
    osc.connect(og);
    og.connect(masterGain);
    osc.start();

    activeSources = [noise, osc];
  }

  function stopAudio() {
    if (!masterGain) return;
    const ctx = audioCtx;
    const t = ctx.currentTime;
    masterGain.gain.setValueAtTime(masterGain.gain.value, t);
    masterGain.gain.linearRampToValueAtTime(0, t + 0.2);
    activeSources.forEach(s => { try { s.stop(t + 0.25); } catch(e) {} });
    activeSources = [];
    masterGain = null;
  }
// === DOG SWITCH ===
  function showDog(n) {
    dogs.forEach((d, i) => d.classList.toggle('active', i === n - 1));
  }

  // === HEAT BAR ===
  function updateHeat(pct) {
    heatBar.style.width = pct + '%';
    heatBar.classList.toggle('danger', pct > 75);
  }

  // === RIPPLE ===
  function addRipple(e) {
    const rect = btn.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.cssText = `width:90px;height:90px;left:${cx-45}px;top:${cy-45}px`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  // === GAME LOOP ===
  function gameLoop() {
    if (!isHolding) return;
    const elapsed = Date.now() - holdStart;
    const pct = Math.min(100, (elapsed / OVERDRY_MS) * 100);
    updateHeat(pct);

    if (elapsed >= OVERDRY_MS && phase !== 2) {
      phase = 2;
      showDog(3);
      startAudio(true);
      document.body.classList.add('shaking');
      dangerFl.classList.add('active');
      statusText.textContent = '😵 QUÁ NÓNG! THẢ RA!!';
      statusText.style.color = '#ff5555';
    }

    rafId = requestAnimationFrame(gameLoop);
  }

  // === START ===
  function startHold(e) {
    if (isHolding) return;
    e.preventDefault();
    isHolding = true;
    holdStart = Date.now();
    phase = 1;

    btn.classList.add('pressed');
    showDog(2);
    startAudio(false);
    steamOv.classList.add('active');
    statusText.textContent = '💨 Đang sấy... giữ tiếp đi!';
    statusText.style.color = '#FFD93D';
    addRipple(e);
    rafId = requestAnimationFrame(gameLoop);
  }

  // === STOP ===
  function stopHold(e) {
    if (!isHolding) return;
    if (e) e.preventDefault();
    isHolding = false;
    phase = 0;
    cancelAnimationFrame(rafId);
    btn.classList.remove('pressed');
    showDog(1);
    stopAudio();
    document.body.classList.remove('shaking');
    steamOv.classList.remove('active');
    dangerFl.classList.remove('active');
    updateHeat(0);
    statusText.textContent = '🐾 Nhấn giữ để sấy!';
    statusText.style.color = '';
  }

  // === EVENTS ===
  btn.addEventListener('touchstart',  startHold, { passive: false });
  btn.addEventListener('touchend',    stopHold,  { passive: false });
  btn.addEventListener('touchcancel', stopHold,  { passive: false });
  btn.addEventListener('mousedown',   startHold);
  document.addEventListener('mouseup', stopHold);
  btn.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] Đã đăng ký, app chạy offline vĩnh viễn!');
        // Force update ngay
        reg.update();
      })
      .catch(err => console.warn('[SW] Lỗi:', err));
  });
}
</script>
